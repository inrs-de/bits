<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bits from Debian Records</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      max-width: 720px;
      width: 100%;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 12px;
    }
    p {
      margin: 0;
      line-height: 1.8;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🐧 Bits from Debian Records</h1>
    <p>最近 6 条记录。</p>
  </div>
</body>
</html>
