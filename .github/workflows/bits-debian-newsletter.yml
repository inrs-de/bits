name: Bits from Debian Newsletter

on:
  schedule:
    - cron: "26 10 * * 6"
  workflow_dispatch:

concurrency:
  group: bits-debian-newsletter
  cancel-in-progress: false

jobs:
  build-send-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          OPENROUTER_MODEL: openrouter/free
          PYTHONUTF8: "1"
        run: python scripts/run.py

      - name: Commit docs updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/feed-history.json docs/index.html

          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "chore: update Bits from Debian history"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: build-send-and-upload
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
